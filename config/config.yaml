# Exchange and API credentials
exchange: "binance"
# Make sure to set API keys as environment variables or in a .env file
# api_key: ${BINANCE_API_KEY}
# secret: ${BINANCE_SECRET_KEY}

# Trading parameters
symbols:
  - "BTC/USDT"
  - "ETH/USDT"
  - "SOL/USDT"

timeframe: "5m"
poll_seconds: 60
cooldown_minutes: 10

# RSI Signal Configuration
rsi:
  period: 14
  buy_threshold: 30
  sell_threshold: 70

# Africa Signals Configuration (Example)
africa_signals:
  enabled: false # Set to true to enable
  api_url: "https://api.example-africa-data.com/v1/market-sentiment"
  api_key: ${AFRICA_DATA_API_KEY}
  weight: 0.25

# Log file path
csv_log: "benson_signals.csv"
